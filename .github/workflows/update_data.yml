name: 自动更新 FRED 宏观数据

# 触发条件
on:
  schedule:
    # 每天 UTC 时间早上 8 点执行 (北京时间下午 4 点)
    # FRED 数据通常在美国时间早上发布，这个时间抓取比较合适
    - cron: '0 8 * * *'
  
  # 允许你在 GitHub 网页上手动点击按钮运行 (方便测试)
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # 赋予机器人写入代码仓库的权限
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. 安装需要的第三方库 (新增了 requests, beautifulsoup4, openpyxl，xlrd)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas fredapi requests beautifulsoup4 openpyxl xlrd plotly yfinance

      # 4. 运行所有抓取脚本
      - name: Run fetch scripts
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          # 运行 FRED 抓取脚本
          python scripts/fetch_fred.py
          
          # 运行 NAAIM 抓取脚本
          python scripts/fetch_naaim.py

          # 运行 AAII 抓取脚本
          python scripts/fetch_aaii.py

          # 运行 CFTC 抓取脚本
          python scripts/fetch_cftc.py

          # 运行 yfinace 抓取脚本
          python scripts/fetch_yfinace.py

      # 5. 将新生成的 CSV 文件提交并推送到仓库
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 追踪 data 文件夹下所有的 csv 文件
          git add data/*.csv
          
          git commit -m "🤖 Auto-update FRED and NAAIM data" || echo "No changes to commit"
          git pull --rebase origin main
          git push